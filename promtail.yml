server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: https://insight-logs-prod-eu-central-0.grafana.net/loki/api/v1/push
    basic_auth:
      username: 1570762
      password: configured

scrape_configs:
  - job_name: cowrie
    static_configs:
      - targets:
          - localhost
        labels:
          job: cowrie
          source: railway
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            eventid: eventid
            username: username
            password: password
            src_ip: src_ip
            src_port: src_port
            dst_port: dst_port
            protocol: protocol
            message: message
            input: input
      - labels:
          eventid:
          protocol:
          src_ip:
      - timestamp:
          source: timestamp
          format: RFC3339
